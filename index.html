<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برنامج تسجيل عمليات الدفع</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>برنامج تسجيل عمليات الدفع اليومية</h1>

<div class="top">

<div>

<label>التاريخ</label>

<input type="date" id="today">

</div>

<div>

<label>بحث عن عميل</label>

<input type="text" id="search" placeholder="اسم العميل">

</div>

</div>

<div class="buttons">

<button id="addCustomer">

➕ إضافة عميل

</button>

<button id="print">

🖨 طباعة

</button>

<button id="export">

📤 Excel

</button>

</div>

<table id="paymentTable">

<thead>

<tr>

<th>#</th>

<th>اسم العميل</th>

<th>المشتريات</th>

<th>الصندوق</th>

<th>الخزنة</th>

<th>الاحتياطي</th>

<th>المجموع</th>

<th>الفرق</th>

<th>الحالة</th>

<th>ملاحظات</th>

<th>حذف</th>

</tr>

</thead>

<tbody>

</tbody>

<tfoot>

<tr>

<td colspan="2">

الإجمالي

</td>

<td id="totalPurchases">0</td>

<td id="totalBox">0</td>

<td id="totalSafe">0</td>

<td id="totalReserve">0</td>

<td id="grandTotal">0</td>

<td colspan="4"></td>

</tr>

</tfoot>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
